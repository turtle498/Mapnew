<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WM+ Navigator - Bắc Giang</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00e59b;
  --green-dim: #00b478;
  --bg: #080e14;
  --card: #0f1a24;
  --card2: #162030;
  --border: rgba(0,229,155,0.12);
  --text: #e8f4ff;
  --muted: #5a7a8a;
  --done: #1a3a2a;
  --done-text: #00b478;
  --warn: #ff9500;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(180deg, #0d1f2d 0%, var(--bg) 100%);
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.brand-sub { font-size: 10px; color: var(--green); font-weight: 500; }

.header-stats {
  display: flex;
  gap: 8px;
}

.hstat {
  background: rgba(0,229,155,0.08);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px 11px;
  text-align: center;
}
.hstat-val { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--green); line-height: 1; }
.hstat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Progress bar */
.progress-wrap { }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 5px;
}
.progress-label span { color: var(--green); font-weight: 600; }
.progress-track {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-dim), var(--green));
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* ── CURRENT STORE CARD ── */
.current-wrap {
  padding: 14px 16px 0;
  flex-shrink: 0;
}

.current-card {
  background: linear-gradient(135deg, #0d2a1e 0%, #0f2030 100%);
  border: 1px solid rgba(0,229,155,0.25);
  border-radius: 18px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}

.current-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(0,229,155,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.current-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,229,155,0.15);
  border: 1px solid rgba(0,229,155,0.3);
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 600;
  color: var(--green);
  margin-bottom: 10px;
}

.current-num {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.current-name {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 12px;
}

.current-coords {
  font-size: 10px;
  color: var(--muted);
  font-family: monospace;
  margin-bottom: 14px;
}

.btn-row {
  display: flex;
  gap: 10px;
}

.btn-nav {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 13px;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  border: none;
  border-radius: 13px;
  color: #080e14;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-nav:active { opacity: 0.85; transform: scale(0.97); }

.btn-done {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 13px 16px;
  background: rgba(0,229,155,0.1);
  border: 1px solid rgba(0,229,155,0.25);
  border-radius: 13px;
  color: var(--green);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn-done:active { background: rgba(0,229,155,0.2); transform: scale(0.97); }

.btn-skip {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 13px 13px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 13px;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-skip:active { background: rgba(255,255,255,0.08); }

/* ── ALL DONE STATE ── */
.done-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  text-align: center;
  gap: 10px;
}
.done-icon { font-size: 52px; }
.done-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--green); }
.done-sub { font-size: 13px; color: var(--muted); }
.btn-reset {
  margin-top: 10px;
  padding: 12px 28px;
  background: rgba(0,229,155,0.1);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--green);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* ── STORE LIST ── */
.list-header {
  padding: 14px 16px 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  flex-shrink: 0;
}

.store-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 24px;
}
.store-list::-webkit-scrollbar { width: 3px; }
.store-list::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

.store-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 13px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}

.store-item.is-done {
  background: var(--done);
  border-color: rgba(0,180,120,0.15);
  opacity: 0.7;
}

.store-item.is-current {
  border-color: rgba(0,229,155,0.4);
  background: #0d2218;
}

.store-item.is-current::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 13px;
  border: 1px solid rgba(0,229,155,0.4);
  pointer-events: none;
}

.s-num {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'Syne', sans-serif;
}

.s-num.pending { background: var(--card2); color: var(--muted); }
.s-num.current { background: linear-gradient(135deg, var(--green-dim), var(--green)); color: #080e14; }
.s-num.done { background: var(--done); color: var(--done-text); }
.s-num.done::after { content: '✓'; }

.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-name.done { color: var(--done-text); text-decoration: line-through; opacity: 0.7; }
.s-name.current { color: #fff; }
.s-dist { font-size: 10px; color: var(--muted); margin-top: 1px; }

.s-arrow {
  font-size: 14px;
  color: var(--muted);
  flex-shrink: 0;
}
.s-arrow.current { color: var(--green); }

/* Completed overlay */
.completed-stamp {
  font-size: 9px;
  font-weight: 700;
  color: var(--done-text);
  background: rgba(0,180,120,0.1);
  border-radius: 6px;
  padding: 2px 7px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🧭</div>
      <div>
        <div class="brand-name">WM+ Navigator</div>
        <div class="brand-sub">Bắc Giang · Lộ trình tối ưu</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val" id="stat-done">0</div>
        <div class="hstat-lbl">Xong</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="stat-left">30</div>
        <div class="hstat-lbl">Còn lại</div>
      </div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Tiến độ hôm nay</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- CURRENT STORE -->
<div class="current-wrap" id="current-wrap">
  <div class="current-card">
    <div class="current-badge">📍 Điểm hiện tại</div>
    <div class="current-num" id="cur-num">ĐIỂM 1 / 30</div>
    <div class="current-name" id="cur-name">—</div>
    <div class="current-coords" id="cur-coords">—</div>
    <div class="btn-row">
      <a class="btn-nav" id="btn-maps" href="#" target="_blank">
        🗺️ Mở Google Maps
      </a>
      <button class="btn-done" onclick="markDone()">
        ✅ Đã đến
      </button>
      <button class="btn-skip" onclick="skipStore()" title="Bỏ qua">⏭</button>
    </div>
  </div>
</div>

<!-- ALL DONE -->
<div class="done-state" id="done-state">
  <div class="done-icon">🎉</div>
  <div class="done-title">Hoàn thành!</div>
  <div class="done-sub">Bạn đã ghé thăm đủ 30 stores hôm nay 💪</div>
  <button class="btn-reset" onclick="resetAll()">🔄 Bắt đầu lại</button>
</div>

<!-- LIST -->
<div class="list-header">Danh sách toàn bộ</div>
<div class="store-list" id="store-list"></div>

<script>
const STORES = [
  { name: "WM+ BNH Thôn Cát, Đồng Việt", lat: 21.023810, lng: 105.817838 },
  { name: "WM+ BGG Phố Bằng, An Hà", lat: 21.048765, lng: 105.845905 },
  { name: "WM+ BGG TDP Đề Nắm, Phồn Xương", lat: 21.048765, lng: 105.845906 },
  { name: "WM+ BNH Thống Nhất, Bố Hạ", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BNH 531-533 Đồi Ngô", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BNH TDP Nội Ninh, Vân Hà", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BNH Ngọc Thành 2, Hoàng Vân", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BNH Gò Pháo, Hợp Thịnh", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BNH Ngọc Liễn, Xuân Cẩm", lat: 21.062307, lng: 105.911635 },
  { name: "WM+ BGG Mai Thượng, Việt Yên", lat: 21.311329, lng: 106.039110 },
  { name: "WM+ BGG 208 Giáp Hải", lat: 21.294680, lng: 106.062699 },
  { name: "WM+ BGG 2A Võ Nguyên Giáp", lat: 21.267762, lng: 106.166079 },
  { name: "WM+ BGG 273 Nguyễn Văn Cừ", lat: 21.269805, lng: 106.201122 },
  { name: "WM+ BGG 322 Lê Lợi", lat: 21.274117, lng: 106.199298 },
  { name: "WM+ BGG 76+78 Đường Lê Lợi", lat: 21.272195, lng: 106.193930 },
  { name: "WM+ BGG 30 Nguyễn Thị Lưu", lat: 21.277035, lng: 106.190596 },
  { name: "WM+ BGG B3 B4 B5 Khu TMDV CC3", lat: 21.283047, lng: 106.190728 },
  { name: "WM+ BGG 61 Trần Nguyên Hãn", lat: 21.283934, lng: 106.196294 },
  { name: "WM+ BGG 36-38 Nguyễn Nghĩa Lập", lat: 21.289503, lng: 106.196346 },
  { name: "WM+ BGG 41 Trần Quang Khải", lat: 21.290653, lng: 106.202757 },
  { name: "WM+ BGG 338-340 Nguyễn Thị Lưu", lat: 21.283944, lng: 106.203708 },
  { name: "WM+ BGG 97 Đào Sư Tích", lat: 21.280390, lng: 106.207256 },
  { name: "WM+ BGG 545 Lê Lợi", lat: 21.277378, lng: 106.209978 },
  { name: "WM+ BGG 223 Hoàng Văn Thụ", lat: 21.283395, lng: 106.211562 },
  { name: "WM+ BGG 713 Lê Lợi", lat: 21.283059, lng: 106.218047 },
  { name: "WM+ BNH TDP Đại Phú 1, Lạng Giang", lat: 21.341299, lng: 106.254310 },
  { name: "WM+ BGG 98-100 Nguyễn Xuân Lan", lat: 21.351561, lng: 106.259378 },
  { name: "WM+ BGG 128 Nguyễn Trãi", lat: 21.353508, lng: 106.262180 },
  { name: "WM+ BGG Đông Phú, Yên Dũng", lat: 21.243740, lng: 106.263209 },
  { name: "WM+ BGG Nham Biền, Yên Dũng", lat: 21.196610, lng: 106.250026 },
];

const STORAGE_KEY = 'wm_bacgiang_progress';

// Load state
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || {
  current: 0,
  done: [],
  skipped: []
};

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function mapsUrl(store) {
  return `https://www.google.com/maps/dir/?api=1&destination=${store.lat},${store.lng}&travelmode=driving`;
}

function renderHeader() {
  const doneCount = state.done.length;
  const total = STORES.length;
  const pct = Math.round(doneCount / total * 100);
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-left').textContent = total - doneCount;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderCurrent() {
  const allDone = state.done.length === STORES.length;
  document.getElementById('current-wrap').style.display = allDone ? 'none' : 'block';
  document.getElementById('done-state').style.display = allDone ? 'flex' : 'none';

  if (allDone) return;

  // Find next undone store starting from state.current
  let idx = state.current;
  while (state.done.includes(idx) && idx < STORES.length) idx++;
  if (idx >= STORES.length) {
    // all done
    document.getElementById('current-wrap').style.display = 'none';
    document.getElementById('done-state').style.display = 'flex';
    return;
  }
  state.current = idx;

  const s = STORES[idx];
  document.getElementById('cur-num').textContent = `ĐIỂM ${idx + 1} / ${STORES.length}`;
  document.getElementById('cur-name').textContent = s.name;
  document.getElementById('cur-coords').textContent = `${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}`;
  document.getElementById('btn-maps').href = mapsUrl(s);
}

function renderList() {
  const list = document.getElementById('store-list');
  list.innerHTML = '';
  STORES.forEach((s, i) => {
    const isDone = state.done.includes(i);
    const isCurrent = i === state.current && !isDone;

    const item = document.createElement('div');
    item.className = `store-item${isDone ? ' is-done' : ''}${isCurrent ? ' is-current' : ''}`;
    item.id = `store-item-${i}`;

    let numClass = isDone ? 'done' : isCurrent ? 'current' : 'pending';
    let nameClass = isDone ? 'done' : isCurrent ? 'current' : '';
    let arrowClass = isCurrent ? 'current' : '';

    item.innerHTML = `
      <div class="s-num ${numClass}">${isDone ? '' : i + 1}</div>
      <div class="s-info">
        <div class="s-name ${nameClass}">${s.name}</div>
        <div class="s-dist">${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div>
      </div>
      ${isDone ? '<div class="completed-stamp">✓ Xong</div>' : `<div class="s-arrow ${arrowClass}">${isCurrent ? '📍' : '›'}</div>`}
    `;

    // Click to jump to this store
    if (!isDone) {
      item.onclick = () => {
        state.current = i;
        save();
        render();
        document.getElementById('current-wrap').scrollIntoView({ behavior: 'smooth' });
      };
    }

    list.appendChild(item);
  });
}

function render() {
  renderHeader();
  renderCurrent();
  renderList();
}

function markDone() {
  const idx = state.current;
  if (!state.done.includes(idx)) {
    state.done.push(idx);
  }
  // Advance to next
  let next = idx + 1;
  while (next < STORES.length && state.done.includes(next)) next++;
  state.current = next < STORES.length ? next : idx;
  save();
  render();
  // Scroll list to current
  setTimeout(() => {
    const el = document.getElementById(`store-item-${state.current}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

function skipStore() {
  let next = state.current + 1;
  while (next < STORES.length && state.done.includes(next)) next++;
  if (next < STORES.length) {
    state.current = next;
    save();
    render();
  }
}

function resetAll() {
  state = { current: 0, done: [], skipped: [] };
  save();
  render();
}

render();
</script>
</body>
</html>
